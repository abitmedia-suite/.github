name: User Story
description: Template for creating user stories
projects: ['abitmedia-suite/3']
type: Feature
labels: ['enhancement']
body:
  - type: input
    id: as-a
    attributes:
      label: As a
      placeholder: "User role or type"
    validations:
      required: true

  - type: input
    id: i-want
    attributes:
      label: I want
      placeholder: "Desired action or functionality"
    validations:
      required: true

  - type: input
    id: so-that
    attributes:
      label: So that
      placeholder: "Expected benefit or value"
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: List of criteria that must be met for the story to be complete.
      placeholder: |
        - Condition that must be met
        - Another condition that must be met
    validations:
      required: false
