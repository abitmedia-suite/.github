name: Historia de usuario
description: Plantilla para crear historias de usuario en español
labels: []
body:
  - type: input
    id: como
    attributes:
      label: Como
      description: Rol de usuario que realizará la acción.
      placeholder: "Rol o tipo de usuario"
    validations:
      required: true

  - type: input
    id: quiero
    attributes:
      label: Quiero
      description: Funcionalidad o acción que se desea realizar.
      placeholder: "Acción o funcionalidad deseada"
    validations:
      required: true

  - type: input
    id: para
    attributes:
      label: Para
      description: Beneficio o valor que se obtiene.
      placeholder: "Beneficio o valor esperado"
    validations:
      required: true

  - type: textarea
    id: criterios-aceptacion
    attributes:
      label: Criterios de aceptación
      description: Lista de criterios que deben cumplirse para que la historia esté completa.
      placeholder: |
        - Condición que debe cumplirse
        - Otra condición que debe cumplirse
    validations:
      required: false

  - type: checkboxes
    id: prioridad
    attributes:
      label: Prioridad
      options:
        - label: Baja
        - label: Media
        - label: Alta
