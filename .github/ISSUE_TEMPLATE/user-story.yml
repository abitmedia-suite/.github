---
name: Historia de usuario
about: Plantilla para crear historias de usuario en español
title: '[HU-XXX] '
labels: 'user-story'
assignees: ''

body:
  - type: textarea
    id: titulo
    attributes:
      label: Título
      description: "Como [rol de usuario], quiero [funcionalidad] para [beneficio]."
      placeholder: "Como usuario registrado, quiero recuperar mi contraseña por correo para poder acceder a mi cuenta."
    validations:
      required: true

  - type: textarea
    id: descripcion
    attributes:
      label: Descripción
      description: Descripción detallada de la historia de usuario y lo que se necesita implementar.
      placeholder: Describe los detalles de la funcionalidad...
    validations:
      required: false

  - type: textarea
    id: criterios-negocio
    attributes:
      label: Criterios de aceptación del negocio
      description: Criterios que deben cumplirse para que la historia esté completa.
      placeholder: "- Criterio 1&#10;- Criterio 2"
    validations:
      required: false

  - type: checkboxes
    id: prioridad
    attributes:
      label: Prioridad
      options:
        - label: Baja
        - label: Media
        - label: Alta
        - label: Crítica

  - type: textarea
    id: pruebas-aceptacion
    attributes:
      label: Pruebas de aceptación
      description: "Formato Gherkin: Dado/Cuando/Entonces"
      placeholder: |
        ### Escenario 1: [Título del escenario]

        **Dado** [condición inicial]
        **Cuando** [acción del usuario]
        **Entonces** [resultado esperado]

        ### Escenario 2: [Título del escenario]

        **Dado** [condición inicial]
        **Cuando** [acción del usuario]
        **Entonces** [resultado esperado]
    validations:
      required: false

  - type: textarea
    id: notas-adicionales
    attributes:
      label: Notas adicionales
      description: Información adicional, dependencias, o consideraciones técnicas.
      placeholder: Cualquier información adicional relevante...
    validations:
      required: false