name: Historia de usuario
description: Plantilla para crear historias de usuario en español
title: 'Título'
labels: ['user-story']
body:
  - type: input
    id: como
    attributes:
      label: Como
      description: Rol de usuario que realizará la acción.
      placeholder: "usuario registrado"
    validations:
      required: true

  - type: input
    id: quiero
    attributes:
      label: Quiero
      description: Funcionalidad o acción que se desea realizar.
      placeholder: "recuperar mi contraseña por correo"
    validations:
      required: true

  - type: input
    id: para
    attributes:
      label: Para
      description: Beneficio o valor que se obtiene.
      placeholder: "poder acceder a mi cuenta"
    validations:
      required: true

  - type: textarea
    id: criterios-aceptacion
    attributes:
      label: Criterios de aceptación
      description: Lista de criterios que deben cumplirse para que la historia esté completa.
      placeholder: |
        - Criterio 1
        - Criterio 2
        - Criterio 3
    validations:
      required: false

  - type: checkboxes
    id: prioridad
    attributes:
      label: Prioridad
      options:
        - label: Baja
        - label: Media
        - label: Alta
